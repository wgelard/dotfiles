# Starship prompt configuration
# Docs: https://starship.rs/config/

# Wait 10ms for commands to complete before showing prompt
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[git_branch]
symbol = " "
truncation_length = 30

[git_status]
# Show counts instead of just symbols
ahead  = "⇡${count}"
behind = "⇣${count}"
staged    = "[+${count}](green)"
modified  = "[~${count}](yellow)"
untracked = "[?${count}](blue)"
deleted   = "[-${count}](red)"
conflicted = "[=${count}](bold red)"

[directory]
truncation_length = 4
truncate_to_repo  = true

[cmd_duration]
# Show how long a command took if it ran for more than 2 seconds
min_time = 2_000
format   = " took [$duration](bold yellow)"

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[package]
disabled = true
