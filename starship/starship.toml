# Starship prompt configuration
# Docs: https://starship.rs/config/

# Wait 10ms for commands to complete before showing prompt
command_timeout = 1000

[character]
success_symbol = '[\$](bold white)'
error_symbol   = '[\$](bold red)'

[git_branch]
symbol = ""
format = "[(\\($branch\\))](cyan) "
truncation_length = 30

[git_status]
format = ""

[directory]
style = "yellow"
truncation_length = 4
truncate_to_repo  = true

[cmd_duration]
# Show how long a command took if it ran for more than 2 seconds
min_time = 2_000
format   = " took [$duration](bold yellow)"

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[package]
disabled = true
